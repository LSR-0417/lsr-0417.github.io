<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPFS 多網關 HLS 播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- 引入 Plyr 播放器套件 -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 20px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      select,
      input[type='text'] {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
      }

      input[type='text'] {
        flex: 2;
        min-width: 0;
      }

      select {
        flex: 1;
        cursor: pointer;
        background-color: #fafafa;
      }

      button {
        padding: 12px 25px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
        white-space: nowrap;
      }

      button:hover {
        background-color: #0056b3;
        transform: translateY(-1px);
      }

      #shareBtn {
        background-color: #28a745;
      }
      #shareBtn:hover {
        background-color: #218838;
      }

      /* 播放器容器外框：確保重新生成標籤時佈局穩定 */
      #player-wrapper {
        width: 100%;
        margin-top: 10px;
        background-color: #000;
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
      }

      .plyr {
        height: 100%;
      }

      video {
        width: 100%;
        background-color: #000;
      }

      #status {
        margin-top: 15px;
        color: #555;
        font-size: 14px;
        font-style: italic;
      }

      label {
        font-size: 14px;
        color: #333;
        font-weight: bold;
      }

      /* --- RWD 響應式設計 --- */
      .action-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
      }

      .btn-icon {
        display: none;
      }

      @media (max-width: 600px) {
        .container {
          padding: 15px;
          margin-top: 20px;
        }

        .btn-text {
          display: none;
        }

        .btn-icon {
          display: block;
          font-size: 1.2rem;
        }

        .action-btn {
          padding: 0;
          width: 46px;
          height: 46px;
          flex-shrink: 0;
          border-radius: 8px;
        }

        label[for='gatewaySelect'] {
          display: none;
        }

        select {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🚀 IPFS 串流播放器</h2>

      <div class="control-panel">
        <div class="input-row">
          <label for="gatewaySelect">選擇網關：</label>
          <select id="gatewaySelect">
            <option value="http://127.0.0.1:8080/ipfs/">
              本地 (最穩定/測試首選)
            </option>
            <option value="https://gateway.pinata.cloud/ipfs/">
              Pinata (速度快/推薦)
            </option>
            <option value="https://dweb.link/ipfs/">
              DWeb.link (官方推薦)
            </option>
            <option value="https://ipfs.io/ipfs/" selected>
              IPFS.io (標準網關)
            </option>
          </select>
        </div>

        <div class="input-row">
          <input
            type="text"
            id="cidInput"
            placeholder="請輸入資料夾 CID (例如: Qm...)"
          />
          <button id="playBtn" class="action-btn">
            <span class="btn-text">📥 載入資源</span>
            <span class="btn-icon">📥</span>
          </button>
          <button
            id="shareBtn"
            class="action-btn"
            title="複製包含目前播放時間的連結"
          >
            <span class="btn-text">🔗 分享片段</span>
            <span class="btn-icon">🔗</span>
          </button>
        </div>
      </div>

      <!-- 播放器 Wrapper -->
      <div id="player-wrapper">
        <video
          id="video"
          crossorigin="anonymous"
          playsinline
          webkit-playsinline
        ></video>
      </div>

      <div id="status">準備就緒</div>
    </div>

    <script>
      const cidInput = document.getElementById('cidInput');
      const gatewaySelect = document.getElementById('gatewaySelect');
      const playBtn = document.getElementById('playBtn');
      const shareBtn = document.getElementById('shareBtn');
      const statusText = document.getElementById('status');
      const playerWrapper = document.getElementById('player-wrapper');

      let hlsInstance = null;
      let playerInstance = null;

      // 核心函數：處理資源載入與生命週期重建
      async function loadVideoResource(startTime = 0) {
        const cid = cidInput.value.trim();
        const selectedGateway = gatewaySelect.value;

        if (!cid) {
          alert('請先輸入 CID！');
          return;
        }

        statusText.textContent = `清理舊實例中...`;

        // 1. 徹底銷毀與解構舊播放器
        if (playerInstance) {
          playerInstance.destroy();
          playerInstance = null;
        }
        if (hlsInstance) {
          hlsInstance.detachMedia();
          hlsInstance.destroy();
          hlsInstance = null;
        }

        // 2. 生命週期關鍵：重建 Video DOM 節點以確保 Hls.js 附加在乾淨的環境
        playerWrapper.innerHTML = `<video id="video" crossorigin="anonymous" playsinline webkit-playsinline></video>`;
        const video = document.getElementById('video');

        // 更新網址列
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('cid', cid);
        currentUrl.searchParams.delete('t');
        window.history.pushState({}, '', currentUrl);

        const ipfsBaseUrl = `${selectedGateway}${cid}/`;
        const m3u8Url = `${ipfsBaseUrl}output.m3u8`;

        statusText.textContent = `正在探測資源與字幕...`;

        // 探測字幕
        const possibleSubtitles = [
          { lang: 'zh-TW', label: '預設字幕', filename: 'subtitle.vtt' },
          { lang: 'en', label: 'English', filename: 'en.vtt' },
          { lang: 'zh-TW', label: '繁體中文', filename: 'zh-TW.vtt' },
        ];

        let foundSubtitle = false;
        for (const sub of possibleSubtitles) {
          try {
            const resp = await fetch(`${ipfsBaseUrl}${sub.filename}`, {
              method: 'HEAD',
            });
            if (resp.ok) {
              const track = document.createElement('track');
              track.kind = 'subtitles';
              track.label = sub.label;
              track.srclang = sub.lang;
              track.src = `${ipfsBaseUrl}${sub.filename}`;
              if (!foundSubtitle) {
                track.default = true;
                foundSubtitle = true;
              }
              video.appendChild(track);
            }
          } catch (e) {}
        }

        // 3. 根據瀏覽器環境啟動 hls.js 或原生播放
        if (Hls.isSupported()) {
          const hlsConfig = startTime > 0 ? { startPosition: startTime } : {};
          hlsInstance = new Hls(hlsConfig);
          hlsInstance.loadSource(m3u8Url);
          hlsInstance.attachMedia(video);

          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            const qualities = hlsInstance.levels.map((l) => l.height);
            qualities.unshift(0); // 0 代表自動

            playerInstance = new Plyr(video, {
              captions: { active: true, update: true, language: 'zh-TW' },
              fullscreen: { iosNative: true },
              quality: {
                default: 0,
                options: qualities,
                forced: true,
                onChange: (q) => {
                  if (q === 0) hlsInstance.currentLevel = -1;
                  else
                    hlsInstance.levels.forEach((l, i) => {
                      if (l.height === q) hlsInstance.currentLevel = i;
                    });
                },
              },
              i18n: { qualityLabel: { 0: '自動 (Auto)' } },
            });
            statusText.textContent = `✅ 資源就緒！請手動播放${startTime > 0 ? ` (將從 ${startTime} 秒開始)` : ''}。`;
          });

          hlsInstance.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal)
              statusText.textContent = `❌ 載入失敗，請嘗試更換網關。`;
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Safari 原生模式
          video.src = m3u8Url;
          playerInstance = new Plyr(video, { fullscreen: { iosNative: true } });
          if (startTime > 0) {
            video.addEventListener(
              'loadedmetadata',
              () => {
                video.currentTime = startTime;
              },
              { once: true }
            );
          }
          statusText.textContent = `✅ 資源就緒（Safari 原生模式）。`;
        }
      }

      // 事件監聽
      playBtn.addEventListener('click', () => loadVideoResource(0));
      cidInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadVideoResource(0);
      });

      shareBtn.addEventListener('click', () => {
        const cid = cidInput.value.trim();
        const currentVideo = document.getElementById('video');
        if (!cid || !currentVideo) {
          alert('請先輸入或載入 CID！');
          return;
        }

        const url = new URL(window.location.href);
        url.searchParams.set('cid', cid);
        const t = Math.floor(currentVideo.currentTime);
        if (t > 0) url.searchParams.set('t', t);

        navigator.clipboard.writeText(url.toString()).then(() => {
          const btnText = shareBtn.querySelector('.btn-text');
          const original = btnText.textContent;
          btnText.textContent = '✅ 已複製！';
          setTimeout(() => (btnText.textContent = original), 2000);
        });
      });

      // 頁面初始化
      window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        const t = parseInt(params.get('t'), 10) || 0;
        if (cid) {
          cidInput.value = cid;
          loadVideoResource(t);
        }
      });
    </script>
  </body>
</html>
