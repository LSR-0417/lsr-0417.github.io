<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPFS 多網關 HLS 播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select,
        input[type="text"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        input[type="text"] {
            flex: 2;
        }

        select {
            flex: 1;
            cursor: pointer;
            background-color: #fafafa;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        video {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            aspect-ratio: 16 / 9;
            margin-top: 10px;
        }

        /* 響應式字幕樣式 */
        ::cue {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: clamp(16px, 5vh, 40px);
            font-family: sans-serif;
        }

        video:fullscreen ::cue {
            font-size: 5vh !important;
        }

        #status {
            margin-top: 15px;
            color: #555;
            font-size: 14px;
            font-style: italic;
        }

        label {
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🚀 IPFS 串流播放器</h2>

        <div class="control-panel">
            <div class="input-row">
                <label for="gatewaySelect">選擇網關：</label>
                <select id="gatewaySelect">
                    <option value="http://127.0.0.1:8080/ipfs/">本地 (最穩定/測試首選)</option>
                    <option value="https://gateway.pinata.cloud/ipfs/">Pinata (速度快/推薦)</option>
                    <option value="https://dweb.link/ipfs/">DWeb.link (官方推薦)</option>
                    <option value="https://ipfs.io/ipfs/">IPFS.io (標準網關)</option>
                </select>
            </div>

            <div class="input-row">
                <input type="text" id="cidInput" placeholder="請輸入資料夾 CID (例如: Qm...)">
                <button id="playBtn">開始播放</button>
            </div>
        </div>

        <video id="video" controls crossorigin="anonymous"></video>
        <div id="status">準備就緒</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const cidInput = document.getElementById('cidInput');
        const gatewaySelect = document.getElementById('gatewaySelect');
        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('status');

        let hlsInstance = null;

        async function loadAndPlayVideo() {
            const cid = cidInput.value.trim();
            const selectedGateway = gatewaySelect.value;

            if (!cid) {
                alert('請先輸入 CID！');
                return;
            }

            // 組合完整的基礎路徑
            const ipfsBaseUrl = `${selectedGateway}${cid}/`;
            const m3u8Url = `${ipfsBaseUrl}output.m3u8`;

            statusText.textContent = `正在連線至網關並探測字幕...`;

            // 1. 重置播放器與字幕
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            const oldTracks = video.querySelectorAll('track');
            oldTracks.forEach(t => t.remove());

            // 2. 自動探測字幕 (繁中、英文、日文)
            const possibleSubtitles = [
                { lang: 'en', label: 'English', filename: 'en.vtt' },
                { lang: 'zh-TW', label: '繁體中文', filename: 'zh-TW.vtt' },
                { lang: 'zh-CN', label: '簡體中文', filename: 'zh-CN.vtt' },
                { lang: 'ja', label: '日本語', filename: 'ja.vtt' }
            ];

            let foundSubtitle = false;

            // 使用 Promise.all 同時探測，加快網關響應速度
            const detectionPromises = possibleSubtitles.map(async (sub) => {
                try {
                    const response = await fetch(`${ipfsBaseUrl}${sub.filename}`, { method: 'GET' });
                    if (response.ok) {
                        const track = document.createElement('track');
                        track.kind = 'subtitles';
                        track.label = sub.label;
                        track.srclang = sub.lang;
                        track.src = `${ipfsBaseUrl}${sub.filename}`;
                        return track;
                    }
                } catch (e) { return null; }
            });

            const results = await Promise.all(detectionPromises);
            results.forEach(track => {
                if (track) {
                    if (!foundSubtitle) {
                        track.default = true;
                        foundSubtitle = true;
                    }
                    video.appendChild(track);
                }
            });

            // 3. 載入影片串流
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(m3u8Url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    statusText.textContent = `成功！來源：${selectedGateway}`;
                    video.play().catch(() => {
                        statusText.textContent = "影片已準備好，請點擊播放按鈕。";
                    });
                });

                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusText.textContent = `網關讀取失敗，請嘗試更換其他網關。`;
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // 支援 Safari 原生播放
                video.src = m3u8Url;
                video.play();
            }
        }

        playBtn.addEventListener('click', loadAndPlayVideo);
        cidInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadAndPlayVideo(); });
    </script>
</body>

</html>
