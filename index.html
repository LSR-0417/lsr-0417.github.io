<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPFS 多網關 HLS 播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- 引入 Plyr 播放器套件 -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .control-panel {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 20px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      select,
      input[type='text'] {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
      }

      input[type='text'] {
        flex: 2;
      }

      select {
        flex: 1;
        cursor: pointer;
        background-color: #fafafa;
      }

      button {
        padding: 12px 25px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
        white-space: nowrap;
      }

      button:hover {
        background-color: #0056b3;
        transform: translateY(-1px);
      }

      /* 複製分享按鈕的專屬樣式 */
      #shareBtn {
        background-color: #28a745;
      }
      #shareBtn:hover {
        background-color: #218838;
      }

      /* 讓 Plyr 播放器容器有圓角與陰影，符合原本設計 */
      .plyr {
        border-radius: 8px;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      video {
        width: 100%;
        background-color: #000;
        border-radius: 8px;
        aspect-ratio: 16 / 9;
        margin-top: 10px;
      }

      /* 響應式字幕樣式 */
      ::cue {
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: clamp(16px, 5vh, 40px);
        font-family: sans-serif;
      }

      video:fullscreen ::cue {
        font-size: 5vh !important;
      }

      #status {
        margin-top: 15px;
        color: #555;
        font-size: 14px;
        font-style: italic;
      }

      label {
        font-size: 14px;
        color: #333;
        font-weight: bold;
      }

      /* --- RWD 響應式設計區塊 --- */

      /* 1. 電腦版基礎設定：讓按鈕具備 Flexbox 置中能力 */
      .action-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
      }

      /* 預設隱藏單純的 Icon */
      .btn-icon {
        display: none;
      }

      /* 當螢幕寬度小於 600px 時 */
      @media (max-width: 600px) {
        .container {
          padding: 15px; /* 縮小容器內距，騰出空間給元件 */
          margin-top: 20px;
        }

        .btn-text {
          display: none; /* 隱藏文字 */
        }

        .btn-icon {
          display: block; /* 顯示圖示 */
          font-size: 1.2rem;
          line-height: 1;
        }

        /* 按鈕改造：變成不變形的置中正方形 */
        .action-btn {
          padding: 0;
          width: 46px; /* 固定寬度 */
          height: 46px; /* 固定高度 */
          flex-shrink: 0; /* 強制不被輸入框擠壓 */
          border-radius: 8px;
        }

        /* 輸入框與按鈕的間距微調 */
        .input-row {
          gap: 8px;
        }

        input[type='text'] {
          padding: 10px; /* 稍微縮小輸入框內距 */
          font-size: 14px; /* 稍微縮小字體防止 CID 太長看不見 */
        }

        /* 隱藏網關選單的標籤文字 */
        label[for='gatewaySelect'] {
          display: none;
        }

        select {
          width: 100%; /* 讓網關選單佔滿整行 */
        }
      }

      /* 針對 375px 以下極窄螢幕的終極微調 */
      @media (max-width: 380px) {
        .container {
          padding: 10px; /* 進一步壓縮內距 */
        }

        .action-btn {
          width: 42px; /* 按鈕稍微縮小一點點 */
          height: 42px;
        }

        h2 {
          font-size: 1.2rem; /* 標題縮小避免換行 */
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🚀 IPFS 串流播放器</h2>

      <div class="control-panel">
        <div class="input-row">
          <label for="gatewaySelect">選擇網關：</label>
          <select id="gatewaySelect">
            <option value="http://127.0.0.1:8080/ipfs/">
              本地 (最穩定/測試首選)
            </option>
            <option value="https://gateway.pinata.cloud/ipfs/">
              Pinata (速度快/推薦)
            </option>
            <option value="https://dweb.link/ipfs/">
              DWeb.link (官方推薦)
            </option>
            <option value="https://ipfs.io/ipfs/" selected>
              IPFS.io (標準網關)
            </option>
          </select>
        </div>

        <div class="input-row">
          <input
            type="text"
            id="cidInput"
            placeholder="請輸入資料夾 CID (例如: Qm...)"
          />
          <button id="playBtn" class="action-btn">
            <span class="btn-text">▶️ 開始播放</span>
            <span class="btn-icon">▶️</span>
          </button>
          <button
            id="shareBtn"
            class="action-btn"
            title="複製包含目前播放時間的連結"
          >
            <span class="btn-text">🔗 分享片段</span>
            <span class="btn-icon">🔗</span>
          </button>
        </div>
      </div>

      <video
        id="video"
        crossorigin="anonymous"
        playsinline
        webkit-playsinline
      ></video>
      <div id="status">準備就緒</div>
    </div>

    <script>
      const video = document.getElementById('video');
      const cidInput = document.getElementById('cidInput');
      const gatewaySelect = document.getElementById('gatewaySelect');
      const playBtn = document.getElementById('playBtn');
      const shareBtn = document.getElementById('shareBtn');
      const statusText = document.getElementById('status');

      let hlsInstance = null;
      let playerInstance = null; // 新增 Plyr 播放器實例變數

      // 【修改 1】讓載入函數可以接收一個起始時間參數 (預設為 0)
      async function loadAndPlayVideo(startTime = 0) {
        const cid = cidInput.value.trim();
        const selectedGateway = gatewaySelect.value;

        if (!cid) {
          alert('請先輸入 CID！');
          return;
        }

        // 更新網址列的 CID (如果有指定時間，就在分享按鈕那邊處理，這裡只保持乾淨的 CID)
        const currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('cid', cid);
        // 每次手動重新載入時，清空網址列上的 t 參數，避免卡在同一個時間點
        currentUrl.searchParams.delete('t');
        window.history.pushState({}, '', currentUrl);

        const ipfsBaseUrl = `${selectedGateway}${cid}/`;
        // 將尋找的目標改回主播放清單 output.m3u8
        const m3u8Url = `${ipfsBaseUrl}output.m3u8`;

        statusText.textContent = `正在連線至網關並探測字幕...`;

        // 銷毀舊的播放器實例以防衝突
        if (playerInstance) {
          playerInstance.destroy();
          playerInstance = null;
        }
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        const oldTracks = video.querySelectorAll('track');
        oldTracks.forEach((t) => t.remove());

        // 【修正】加入 subtitle.vtt 作為預設探測目標
        const possibleSubtitles = [
          { lang: 'zh-TW', label: '預設字幕', filename: 'subtitle.vtt' },
          { lang: 'en', label: 'English', filename: 'en.vtt' },
          { lang: 'zh-TW', label: '繁體中文', filename: 'zh-TW.vtt' },
          { lang: 'zh-CN', label: '簡體中文', filename: 'zh-CN.vtt' },
          { lang: 'ja', label: '日本語', filename: 'ja.vtt' },
        ];

        let foundSubtitle = false;
        const detectionPromises = possibleSubtitles.map(async (sub) => {
          try {
            const response = await fetch(`${ipfsBaseUrl}${sub.filename}`, {
              method: 'GET',
            });
            if (response.ok) {
              const track = document.createElement('track');
              track.kind = 'subtitles';
              track.label = sub.label;
              track.srclang = sub.lang;
              track.src = `${ipfsBaseUrl}${sub.filename}`;
              return track;
            }
          } catch (e) {
            return null;
          }
        });

        const results = await Promise.all(detectionPromises);
        results.forEach((track) => {
          if (track) {
            if (!foundSubtitle) {
              track.default = true;
              foundSubtitle = true;
            }
            video.appendChild(track);
          }
        });

        // 【修改 2】在 HLS.js 實例化時，傳入起始時間參數
        if (Hls.isSupported()) {
          // 利用 startPosition 讓 hls.js 從指定的秒數開始下載切片
          const hlsConfig = startTime > 0 ? { startPosition: startTime } : {};
          hlsInstance = new Hls(hlsConfig);

          hlsInstance.loadSource(m3u8Url);
          hlsInstance.attachMedia(video);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            // 提取所有可用的畫質 (例如: 2160, 1080, 720)
            const availableQualities = hlsInstance.levels.map((l) => l.height);
            // 加入 0 代表「自動 (Auto)」自適應位元率
            availableQualities.unshift(0);

            // 初始化 Plyr 播放器，並綁定畫質選單
            playerInstance = new Plyr(video, {
              captions: { active: true, update: true, language: 'zh-TW' },
              fullscreen: { iosNative: true }, // 【新增】針對 iOS 強制使用原生全螢幕
              quality: {
                default: 0, // 預設為自動切換
                options: availableQualities,
                forced: true, // 強制覆蓋原生畫質選單
                onChange: (newQuality) => {
                  if (newQuality === 0) {
                    hlsInstance.currentLevel = -1; // -1 在 hls.js 中代表開啟自動切換 (ABR)
                  } else {
                    // 根據使用者選擇的高度 (例如 1080)，找到對應的 HLS level index 並強制切換
                    hlsInstance.levels.forEach((level, levelIndex) => {
                      if (level.height === newQuality) {
                        hlsInstance.currentLevel = levelIndex;
                      }
                    });
                  }
                },
              },
              i18n: {
                qualityLabel: {
                  0: '自動 (Auto)', // 將 0 標示為自動
                },
              },
            });

            statusText.textContent =
              startTime > 0
                ? `成功！從 ${startTime} 秒處開始播放。`
                : `成功！來源：${selectedGateway}`;

            // 使用 Plyr 實例來呼叫播放
            playerInstance.play().catch(() => {
              statusText.textContent =
                '影片已準備好，請點擊畫面或播放按鈕開始。';
            });
          });

          hlsInstance.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              statusText.textContent = `網關讀取失敗，請嘗試更換其他網關。`;
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // 針對 Safari (原生支援 HLS 的瀏覽器) 的時間跳轉處理
          video.src = m3u8Url;

          // Safari 原生支援 HLS，我們一樣掛上 Plyr 提供美觀 UI，但畫質切換交由 Apple 設備系統原生處理
          playerInstance = new Plyr(video, {
            captions: { active: true, update: true, language: 'zh-TW' },
            fullscreen: { iosNative: true }, // 【新增】針對 iOS 強制使用原生全螢幕
          });

          if (startTime > 0) {
            // 必須等 metadata 載入後才能調整 currentTime
            video.addEventListener('loadedmetadata', function setTime() {
              video.currentTime = startTime;
              video.removeEventListener('loadedmetadata', setTime); // 執行一次後移除監聽
            });
          }
          video.play().catch(() => {
            statusText.textContent = '影片已準備好，請點擊畫面或播放按鈕開始。';
          });
        }
      }

      playBtn.addEventListener('click', () => loadAndPlayVideo(0)); // 手動點擊播放時，從頭開始
      cidInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadAndPlayVideo(0);
      });

      // 【新增功能 3】一鍵複製帶有當前時間的分享連結
      shareBtn.addEventListener('click', () => {
        const cid = cidInput.value.trim();
        if (!cid) {
          alert('請先輸入或載入 CID！');
          return;
        }

        // 取得目前的播放秒數並無條件捨去小數點
        const currentTime = Math.floor(video.currentTime);

        // 組合分享網址
        const shareUrl = new URL(window.location.href);
        shareUrl.searchParams.set('cid', cid);
        if (currentTime > 0) {
          shareUrl.searchParams.set('t', currentTime);
        }

        // 寫入剪貼簿
        navigator.clipboard
          .writeText(shareUrl.toString())
          .then(() => {
            const originalText = shareBtn.textContent;
            shareBtn.textContent = '✅ 已複製！';
            setTimeout(() => {
              shareBtn.textContent = originalText;
            }, 2000);
          })
          .catch((err) => {
            alert('複製失敗，請手動複製網址列。');
          });
      });

      // 網頁載入時，檢查網址列是否有 cid 與 t 參數
      window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const cidFromUrl = urlParams.get('cid');
        // 如果網址有 ?t=120，將其轉換為整數，若無則為 0
        const timeFromUrl = parseInt(urlParams.get('t'), 10) || 0;

        if (cidFromUrl) {
          cidInput.value = cidFromUrl;
          // 將抓取到的時間參數傳遞給載入函數
          loadAndPlayVideo(timeFromUrl);
        }
      });
    </script>
  </body>
</html>
