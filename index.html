<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPFS HLS 串流測試器 (多語系自動掛載)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        text-align: center;
        margin-top: 50px;
        background-color: #f5f5f5;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .input-group {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
      }
      input[type="text"] {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background-color: #0056b3;
      }
      /* 讓影片稍微有些微的圓角和陰影 */
      video {
        width: 100%;
        background-color: black;
        border-radius: 8px;
        aspect-ratio: 16 / 9;
        margin-top: 15px;
      }
      /* 也可以用 CSS 稍微自訂字幕的樣式 */
      ::cue {
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: clamp(16px, 5vh, 40px);
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      }


      #status {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>IPFS 去中心化影片播放器</h2>

      <div class="input-group">
        <input type="text" id="cidInput" placeholder="請輸入 HLS 資料夾 CID" />
        <button id="playBtn">載入並播放</button>
      </div>

      <video id="video" controls crossorigin="anonymous"></video>
      <div id="status">等待輸入...</div>
    </div>

    <script>
      const video = document.getElementById("video");
      const cidInput = document.getElementById("cidInput");
      const playBtn = document.getElementById("playBtn");
      const statusText = document.getElementById("status");

      let hlsInstance = null;

      function loadAndPlayVideo() {
        const cid = cidInput.value.trim();

        if (!cid) {
          alert("請先輸入有效的 CID！");
          return;
        }

        statusText.textContent = "正在準備播放...";

        const m3u8Filename = "output.m3u8";
        const ipfsBaseUrl = `http://127.0.0.1:8080/ipfs/${cid}/`;
        const videoUrl = `${ipfsBaseUrl}${m3u8Filename}`;

        // 1. 清理舊的 HLS 實體
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        // 2. 清理舊的字幕軌道 (避免切換影片時字幕疊加)
        const oldTracks = video.querySelectorAll("track");
        oldTracks.forEach((t) => t.remove());

        // 3. 【全自動掛載多語系字幕軌道】
        // 這裡定義你可能會放進 IPFS 資料夾的字幕檔名
        const subtitles = [
          {
            lang: "zh-TW",
            label: "繁體中文",
            filename: "zh-TW.vtt",
            default: true,
          },
          {
            lang: "zh-CN",
            label: "簡體中文",
            filename: "zh-CN.vtt",
            default: true,
          },
          { lang: "en", label: "English", filename: "en.vtt", default: false },
          { lang: "ja", label: "日本語", filename: "ja.vtt", default: false },
        ];

        // 透過迴圈將所有字幕軌道加進影片中
        subtitles.forEach((sub) => {
          const track = document.createElement("track");
          track.kind = "subtitles";
          track.label = sub.label;
          track.srclang = sub.lang;
          track.src = `${ipfsBaseUrl}${sub.filename}`;

          if (sub.default) {
            track.default = true;
          }

          video.appendChild(track);
        });
        console.log("已嘗試自動掛載多語系字幕");

        // 4. 開始載入影片
        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = videoUrl;
          video.addEventListener("loadedmetadata", function () {
            statusText.textContent = "播放中 (原生支援，嘗試載入多語系字幕)";
            video.play();
          });
        } else if (Hls.isSupported()) {
          hlsInstance = new Hls();
          hlsInstance.loadSource(videoUrl);
          hlsInstance.attachMedia(video);

          hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
            statusText.textContent = "播放清單解析成功！(嘗試載入多語系字幕)";
            video.play();
          });

          hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
              statusText.textContent = `發生錯誤: ${data.type}`;
            }
          });
        }
      }

      playBtn.addEventListener("click", loadAndPlayVideo);

      // 綁定 Enter 鍵事件，提升使用者體驗
      cidInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          loadAndPlayVideo();
        }
      });
    </script>
  </body>
</html>
